name: Build & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    uses: dev2b-tec/core-cicd-templates/.github/workflows/ci-docker.yml@main
    permissions:
      contents: read
      packages: write
    with:
      image-name: ghcr.io/${{ github.repository }}
      registry: ghcr.io
      dockerfile: Dockerfile
      context: app
      push: ${{ github.event_name == 'push' }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    uses: dev2b-tec/core-cicd-templates/.github/workflows/docker-deploy.yml@main
    with:
      app_name: dev2b-landing
      image_tag: main
      deploy_path: /opt/apps/dev2b-landing
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
